services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hha
      POSTGRES_USER: hha
      POSTGRES_PASSWORD: hha_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hha -d hha"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  mosquitto:
